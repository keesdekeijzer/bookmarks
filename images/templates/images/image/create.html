{% extends 'base.html' %}

{% block title %}Bookmark an image{% endblock %}

{% block content %}
  <h1>Bookmark an image</h1>
  <img src="{{ request.GET.url }}" class="image-preview" alt="Image to bookmark" style="max-width: 300px; max-height: 300px;">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Bookmark image">
  </form>
{% endblock %}
