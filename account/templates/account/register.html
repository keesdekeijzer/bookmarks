{% extends "base.html" %}

{% block title %}Create an account{% endblock %}

{% block content %}
  <h2>Create an account</h2>
  <p>Please fill in the form below to create an account.</p>
  <form method="post">
    {% csrf_token %}
    {{ user_form.as_p }}
    <p><input type="submit" value="Create my account"></p>
  </form>
{% endblock %}
